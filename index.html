<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Fiszki — aplikacja do efektywnej nauki z fiszkami. Twórz talie, dodawaj fiszki i ucz się z animacjami." />
    <title>Fiszki — Ucz się efektywnie</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      (function() {
        document.addEventListener('keydown', function(e) {
          if (e.key === 'F12') {
            e.preventDefault();
            return false;
          }
          if (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'i' || e.key === 'J' || e.key === 'j' || e.key === 'C' || e.key === 'c')) {
            e.preventDefault();
            return false;
          }
          if (e.ctrlKey && (e.key === 'U' || e.key === 'u')) {
            e.preventDefault();
            return false;
          }
        });

        document.addEventListener('contextmenu', function(e) {
          e.preventDefault();
          return false;
        });
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
